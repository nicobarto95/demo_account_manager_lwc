<!--
    @description Template for the accountTable LWC.
                 Renders a paginated, sortable Account table with row selection
                 and a mass update action.

                 Layout:
                 ┌─ Header (title, record count, mass update button) ────────┐
                 │  Body                                                      │
                 │  ├─ Loading state   (spinner)                             │
                 │  ├─ Error state     (error message)                       │
                 │  ├─ Data state      (table + pagination footer)           │
                 │  └─ Empty state     (no records message)                  │
                 └────────────────────────────────────────────────────────────┘
-->
<template>
    <div class="at-wrapper">
        <div class="at-card">

            <!-- ═══════════════════════════════════════════════════
                 HEADER
                 ═══════════════════════════════════════════════════ -->
            <div class="at-card__header">
                <div class="at-header__left">
                    <div class="at-header__icon">
                        <lightning-icon icon-name="standard:account" size="small"></lightning-icon>
                    </div>
                    <div>
                        <h1 class="at-header__title">Account Manager</h1>
                        <p class="at-header__subtitle">
                            <template lwc:if={totalRecords}>{totalRecords} total accounts</template>
                        </p>
                    </div>
                </div>
                <div class="at-header__right">
                    <!-- Selection badge — visible only when at least one row is selected -->
                    <template lwc:if={selectedCount}>
                        <span class="at-badge at-badge--selected">{selectedCount} selected</span>
                    </template>

                    <!--
                        lightning-button correctly handles boolean binding for 'disabled'.
                        Native <button> would receive "false" as a string, keeping it
                        permanently disabled — that is why we use the SLDS component here.
                    -->
                    <lightning-button
                        label="✎ Mass Update"
                        class="at-mass-btn"
                        disabled={isMassUpdateDisabled}
                        onclick={handleMassUpdate}
                        variant="brand"
                    ></lightning-button>
                </div>
            </div>

            <!-- ═══════════════════════════════════════════════════
                 BODY — mutually exclusive states
                 ═══════════════════════════════════════════════════ -->
            <div class="at-card__body">

                <!-- LOADING STATE -->
                <template lwc:if={isLoading}>
                    <div class="at-state">
                        <lightning-spinner
                            alternative-text="Loading..."
                            size="medium"
                            variant="brand"
                        ></lightning-spinner>
                        <p class="at-state__text">Loading records…</p>
                    </div>
                </template>

                <!-- ERROR STATE -->
                <template lwc:elseif={hasError}>
                    <div class="at-state at-state--error">
                        <p class="at-state__text">⚠ {errorMessage}</p>
                    </div>
                </template>

                <!-- DATA STATE — table + footer -->
                <template lwc:elseif={hasData}>
                    <div class="at-table-scroll">
                        <table class="at-table">
                            <thead>
                                <tr>
                                    <!-- Select-all checkbox -->
                                    <th class="at-th at-th--chk">
                                        <input
                                            type="checkbox"
                                            class="at-chk"
                                            checked={allSelected}
                                            onchange={handleSelectAll}
                                            title="Select all"
                                        />
                                    </th>

                                    <!--
                                        Column headers — thClass drives sortable vs non-sortable styling.
                                        data-field passes the field name to handleSort without needing
                                        a separate handler per column.
                                    -->
                                    <template for:each={columns} for:item="col">
                                        <th
                                            key={col.fieldName}
                                            class={col.thClass}
                                            onclick={handleSort}
                                            data-field={col.fieldName}
                                            aria-sort={col.ariaSort}
                                        >
                                            <span class="at-th__inner">
                                                {col.label}
                                                <span class="at-th__sort">{col.sortIcon}</span>
                                            </span>
                                        </th>
                                    </template>
                                </tr>
                            </thead>
                            <tbody>
                                <!--
                                    key={acc.Id} is mandatory for LWC loops.
                                    The rendering engine uses it to identify which row
                                    to update without re-rendering the entire table.
                                -->
                                <template for:each={records} for:item="acc">
                                    <tr key={acc.Id} class={acc.rowClass}>

                                        <!-- Row checkbox — data-id passes the record ID to handleRowSelect -->
                                        <td class="at-td at-td--chk">
                                            <input
                                                type="checkbox"
                                                class="at-chk"
                                                data-id={acc.Id}
                                                checked={acc.isSelected}
                                                onchange={handleRowSelect}
                                            />
                                        </td>

                                        <!-- Name — clickable link opens the record in a new tab -->
                                        <td class="at-td at-td--name">
                                            <a href={acc.recordUrl} target="_blank" class="at-link">{acc.Name}</a>
                                        </td>

                                        <!-- Type — colour-coded badge; falls back to em dash if empty -->
                                        <td class="at-td">
                                            <template lwc:if={acc.Type}>
                                                <span class={acc.typeBadgeClass}>{acc.Type}</span>
                                            </template>
                                            <template lwc:else>
                                                <span class="at-nil">—</span>
                                            </template>
                                        </td>

                                        <!-- Phone — formatted and tappable on mobile -->
                                        <td class="at-td">
                                            <template lwc:if={acc.Phone}>
                                                <lightning-formatted-phone value={acc.Phone}></lightning-formatted-phone>
                                            </template>
                                            <template lwc:else>
                                                <span class="at-nil">—</span>
                                            </template>
                                        </td>

                                        <!-- Description — truncated with ellipsis; updated by Mass Update -->
                                        <td class="at-td at-td--description">
                                            <template lwc:if={acc.Description}>
                                                <span class="at-description">{acc.Description}</span>
                                            </template>
                                            <template lwc:else>
                                                <span class="at-nil">—</span>
                                            </template>
                                        </td>

                                        <!-- Created Date — localised via lightning-formatted-date-time -->
                                        <td class="at-td at-td--date">
                                            <lightning-formatted-date-time
                                                value={acc.CreatedDate}
                                                year="numeric"
                                                month="short"
                                                day="2-digit"
                                            ></lightning-formatted-date-time>
                                        </td>

                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>

                    <!-- ═══════════════════════════════════════════════════
                         PAGINATION FOOTER
                         Three-column flex layout:
                           left   → page info label
                           centre → navigation buttons
                           right  → rows-per-page selector
                         overflow: visible on the parent card allows the
                         combobox dropdown to render outside the card bounds.
                         ═══════════════════════════════════════════════════ -->
                    <div class="at-footer">

                        <!-- Left: page info -->
                        <span class="at-footer__info">
                            Page <b>{currentPage}</b> of <b>{totalPages}</b>
                        </span>

                        <!-- Centre: navigation buttons -->
                        <div class="at-footer__nav">
                            <button class="at-pgbtn" disabled={isFirstPage} onclick={handleFirst}    title="First page">«</button>
                            <button class="at-pgbtn" disabled={isFirstPage} onclick={handlePrevious} title="Previous page">‹</button>
                            <span class="at-footer__cur">{currentPage}</span>
                            <button class="at-pgbtn" disabled={isLastPage}  onclick={handleNext}     title="Next page">›</button>
                            <button class="at-pgbtn" disabled={isLastPage}  onclick={handleLast}     title="Last page">»</button>
                        </div>

                        <!-- Right: rows-per-page selector -->
                        <div class="at-footer__size">
                            <label class="at-footer__size-lbl">Rows</label>
                            <lightning-combobox
                                name="pageSize"
                                label="Rows"
                                variant="label-hidden"
                                value={pageSizeString}
                                options={pageSizeOptions}
                                onchange={handlePageSizeChange}
                                dropdown-alignment="bottom-right"
                                class="at-combobox"
                            ></lightning-combobox>
                        </div>

                    </div>
                </template>

                <!-- EMPTY STATE -->
                <template lwc:elseif={isEmpty}>
                    <div class="at-state">
                        <p class="at-state__text">No accounts found.</p>
                    </div>
                </template>

            </div>
        </div>
    </div>
</template>
